<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lab5_1</title>
  <style>
    body {
      margin: 30px;
      font-family: "Times New Roman", serif;
      background-color: #e8e8e8;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,0.55) 1px, transparent 0),
        radial-gradient(circle at 3px 3px, rgba(0,0,0,0.05) 1px, transparent 0);
      background-size: 6px 6px, 8px 8px;
    }

    .menu-box {
      width: 560px;
      padding: 22px 18px;
      background: #ffffff;
    }

    .menu {
      margin: 0;
      padding: 0;
      list-style: none;
      overflow: hidden;
    }

    .menu li {
      float: left;
      margin-right: 12px;
    }

    .menu li:last-child {
      margin-right: 0;
    }

    .menu a {
      display: block;
      width: 94px;
      padding: 14px 0;
      text-align: center;
      font-size: 18px;
      color: #283cff;
      background: #c9c9f3;
      border: 1px solid #d7d7fb;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="menu-box">
    <ul class="menu">
      <li><a href="#">Пункт 1</a></li>
      <li><a href="#">Пункт 2</a></li>
      <li><a href="#">Пункт 3</a></li>
      <li><a href="#">Пункт 4</a></li>
      <li><a href="#">Пункт 5</a></li>
    </ul>
  </div>
</body>
</html>
