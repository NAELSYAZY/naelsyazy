<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Красивое выпадающее меню</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			padding: 40px;
			font-family: Arial, sans-serif;
			background: linear-gradient(135deg, #eaf2ff, #f6f9ff);
		}

		.menu {
			width: 280px;
			background: linear-gradient(180deg, #2f5f8f, #234766);
			border-radius: 18px;
			box-shadow: 0 14px 30px rgba(0, 0, 0, 0.18);
			padding: 14px;
		}

		.menu ul {
			list-style: none;
			margin: 0;
			padding: 0;
		}

		.menu > ul > li {
			position: relative;
			margin-bottom: 10px;
		}

		.menu > ul > li:last-child {
			margin-bottom: 0;
		}

		.menu > ul > li > a {
			display: block;
			position: relative;
			padding: 14px 16px 14px 46px;
			background: rgba(255, 255, 255, 0.12);
			color: #fff;
			text-decoration: none;
			text-transform: uppercase;
			font-size: 18px;
			font-weight: bold;
			letter-spacing: 0.5px;
			border-radius: 12px;
			transition: all 0.3s ease;
		}

		.menu > ul > li > a:hover {
			background: rgba(255, 255, 255, 0.22);
			transform: translateX(6px);
		}

		.menu > ul > li > a::before {
			content: "\f146";
			font-family: "Font Awesome 6 Free";
			font-weight: 900;
			position: absolute;
			left: 16px;
			top: 50%;
			transform: translateY(-50%);
			font-size: 16px;
			color: #ffe08a;
		}

		.menu > ul > li:hover > a::before {
			content: "\f0fe";
			color: #fff4b5;
		}

		.menu li ul {
			display: none;
			margin-top: 8px;
			padding-left: 14px;
			animation: fadeIn 0.3s ease;
		}

		.menu li:hover > ul {
			display: block;
		}

		.menu li li {
			margin: 6px 0;
		}

		.menu li li a {
			display: block;
			position: relative;
			padding: 10px 12px 10px 38px;
			background: rgba(255, 255, 255, 0.92);
			color: #244766;
			text-decoration: none;
			font-size: 15px;
			border-radius: 10px;
			transition: all 0.25s ease;
			box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
		}

		.menu li li a:hover {
			background: #ffe9a8;
			color: #18344d;
			transform: translateX(4px);
		}

		.menu li li a::before {
			content: "\f192";
			font-family: "Font Awesome 6 Free";
			font-weight: 900;
			position: absolute;
			left: 12px;
			top: 50%;
			transform: translateY(-50%);
			font-size: 12px;
			color: #2f5f8f;
		}

		.menu li li a::after {
			content: "";
			position: absolute;
			right: 10px;
			top: 50%;
			transform: translateY(-50%);
			width: 8px;
			height: 8px;
			border-radius: 50%;
			background: rgba(47, 95, 143, 0.18);
		}

		@keyframes fadeIn {
			from {
				opacity: 0;
				transform: translateY(-6px);
			}
			to {
				opacity: 1;
				transform: translateY(0);
			}
		}
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><a href="#">Фильмы</a>
				<ul>
					<li><a href="#">Экшн</a></li>
					<li><a href="#">Мелодрамы</a></li>
					<li><a href="#">Сериалы</a></li>
					<li><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><a href="#">Музыка</a>
				<ul>
					<li><a href="#">Классика</a></li>
					<li><a href="#">Джаз</a></li>
					<li><a href="#">Рок</a></li>
					<li><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><a href="#">Софт</a>
				<ul>
					<li><a href="#">Графика</a></li>
					<li><a href="#">3D-моделирование</a></li>
					<li><a href="#">Машинопись</a></li>
					<li><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><a href="#">Игры</a>
				<ul>
					<li><a href="#">РПГ</a></li>
					<li><a href="#">Шутеры</a></li>
					<li><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
</body>
</html>
